server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: service-stock
          uri: lb://service-stock
          predicates:
            - Path=/api/stock/**
          filters:
            - RewritePath=/api/stock/(?<segment>.*), /api/${segment}
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

info:
  app:
    name: API Gateway - Alzheimer Detection
    description: Passerelle API pour le routage des microservices
    version: 1.0.0
  services:
    stock: /api/stock/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  info:
    env:
      enabled: true
  endpoint:
    gateway:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
